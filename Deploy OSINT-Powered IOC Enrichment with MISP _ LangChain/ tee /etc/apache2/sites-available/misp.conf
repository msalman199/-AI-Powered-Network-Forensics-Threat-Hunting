<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/MISP/app/webroot
    <Directory /var/www/html/MISP/app/webroot>
        Options -Indexes
        AllowOverride all
        Require all granted
    </Directory>
    LogLevel warn
    ErrorLog /var/log/apache2/misp_error.log
    CustomLog /var/log/apache2/misp_access.log combined
</VirtualHost>
